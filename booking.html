            </nav>
        </div>

    <main>
        <section class="booking">
            <h2>Guest Booking</h2>
            <form action="#" method="post">
                <fieldset>
                    <legend>Personal Information</legend>
                    
                    <div class="form-group">
                        <label for="name">Full Name <span class="req">*</span></label>
                        <input type="text" id="name" name="name" placeholder="Sabirin Abdirizak" required />
                    </div>

                    <div class="form-group">
                        <label for="major">Major <span class="req">*</span></label>
                        <select id="major" name="major" required>
                            <option value="">Select your major</option>
                            <option value="cs">Computer Science</option>
                            <option value="it">Information Technology</option>
                            <option value="ds">Data Science</option>
                            <option value="design">Design</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <span class="label">Gender <span class="req">*</span></span>
                        <div class="radio-group">
                            <input type="radio" id="male" name="gender" value="male" required />
                            <label for="male">Male</label>
                            <input type="radio" id="female" name="gender" value="female" />
                            <label for="female">Female</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <span class="label">Hobbies</span>
                        <div class="checkbox-group">
                            <input type="checkbox" id="sports" name="hobbies" value="sports" />
                            <label for="sports">Sports</label>
                            <input type="checkbox" id="music" name="hobbies" value="music" />
                            <label for="music">Music</label>
                            <input type="checkbox" id="reading" name="hobbies" value="reading" />
                            <label for="reading">Reading</label>
                            <input type="checkbox" id="travel" name="hobbies" value="travel" />
                            <label for="travel">Travel</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="comments">Comments</label>
                        <textarea id="comments" name="comments" rows="4" placeholder="Any special requests..."></textarea>
                    </div>
                </fieldset>

                <button type="submit" class="btn">Submit Booking</button>
            </form>
        </section>
    </main>

    <footer>

    </footer>

</html>
